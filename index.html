<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0071E3"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Сеферян"/>
<meta name="description" content="Частная премиальная недвижимость в Сочи. Артём Сеферян."/>
<title>Артём Сеферян — Недвижимость Сочи</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFFFFF;--bg2:#F5F5F7;--bg3:#E8E8ED;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.06);
  --text:#1D1D1F;--text2:#424245;--muted:#6E6E73;--dim:#AEAEB2;
  --blue:#0071E3;--bluea:rgba(0,113,227,0.09);
  --red:#FF3B30;--green:#34C759;
  --shadow:0 2px 16px rgba(0,0,0,0.07);
}
html,body{height:100%;margin:0}
body{background:var(--bg2);color:var(--text);font-family:'Inter',sans-serif;font-weight:400;display:flex;align-items:center;justify-content:center;}
#root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.phone{width:100%;max-width:430px;height:100dvh;background:var(--bg2);position:relative;overflow:hidden;display:flex;flex-direction:column;}
@media(min-width:480px){.phone{height:844px;border-radius:44px;box-shadow:0 48px 140px rgba(0,0,0,0.22),inset 0 0 0 1px rgba(0,0,0,0.08);}}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:36px;background:var(--bg);border-radius:0 0 22px 22px;z-index:200;display:none;}
@media(min-width:480px){.notch{display:block}}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:transform .4s cubic-bezier(.4,0,.2,1),opacity .4s ease;}
.out-left{transform:translateX(-22%);opacity:0;pointer-events:none}
.out-right{transform:translateX(100%);opacity:0;pointer-events:none}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.bnav{display:flex;background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border2);padding:10px 0 env(safe-area-inset-bottom,16px);flex-shrink:0;}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;color:var(--dim);font-size:10px;font-weight:500;letter-spacing:.02em;transition:color .18s;position:relative;}
.bni.on{color:var(--blue)}
.bnbadge{position:absolute;top:-2px;right:24%;width:16px;height:16px;background:var(--blue);color:#fff;border-radius:50%;font-size:9px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.hero{position:relative;height:400px;flex-shrink:0;overflow:hidden;}
.hero img{width:100%;height:100%;object-fit:cover;object-position:center 20%;display:block;}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.05) 30%,rgba(0,0,0,0.72) 100%);}
.hero-text{position:absolute;bottom:0;left:0;right:0;padding:22px 22px 20px;}
.hero-name{font-family:'Playfair Display',serif;font-size:26px;color:#fff;font-weight:400;line-height:1.2;margin-bottom:5px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,0.72);letter-spacing:.02em;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);background:var(--bg);border-bottom:1px solid var(--border2);}
.stat-box{padding:17px 12px;text-align:center;border-right:1px solid var(--border2);}
.stat-box:last-child{border-right:none}
.stat-val{font-family:'Playfair Display',serif;font-size:22px;display:block;margin-bottom:2px;}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.04em;display:block;line-height:1.3;}
.asec{padding:22px;border-bottom:1px solid var(--border2);background:var(--bg);}
.asec-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.asec-p{font-size:14px;line-height:1.78;color:var(--text2);margin-bottom:10px;}
.asec-p:last-child{margin-bottom:0}
.why-row{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px;}
.why-ico{width:22px;height:22px;border-radius:50%;background:var(--bluea);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.why-text{font-size:14px;line-height:1.65;color:var(--text2);}
.badge-row{display:flex;gap:7px;flex-wrap:wrap;}
.badge{padding:6px 13px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:500;}
.tg-banner{margin:16px 20px 20px;background:var(--bluea);border:1px solid rgba(0,113,227,0.14);border-radius:14px;padding:15px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:transform .18s;text-decoration:none;}
.tg-banner:active{transform:scale(.98)}
.tg-ico{width:40px;height:40px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tg-info{flex:1}
.tg-title{font-size:14px;font-weight:600;margin-bottom:2px;color:var(--text);}
.tg-sub{font-size:12px;color:var(--muted);}
.cat-hdr{padding:50px 18px 13px;background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);flex-shrink:0;}
.cat-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;margin-bottom:13px;}
.srch{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:10px 14px;transition:all .2s;}
.srch:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px var(--bluea);}
.srch input{flex:1;background:none;border:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);}
.srch input::placeholder{color:var(--dim)}
.chips{display:flex;gap:7px;overflow-x:auto;padding:11px 18px;border-bottom:1px solid var(--border2);scrollbar-width:none;flex-shrink:0;}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 14px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;color:var(--muted);background:var(--bg);}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.loading-row{display:flex;justify-content:center;align-items:center;padding:48px;color:var(--muted);font-size:13px;gap:8px;}
.empty-row{padding:56px 24px;text-align:center;color:var(--muted);font-size:14px;}
.card{margin:0 16px 12px;border-radius:16px;overflow:hidden;background:var(--bg);border:1px solid var(--border2);cursor:pointer;transition:transform .18s,box-shadow .18s;box-shadow:var(--shadow);animation:cardIn .4s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card:first-child{margin-top:16px}
.card:active{transform:scale(.975);box-shadow:none}
.cimg-wrap{position:relative;overflow:hidden;height:200px;}
.cimg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.card:hover .cimg{transform:scale(1.03)}
.cbadge{position:absolute;top:11px;left:11px;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border:1px solid var(--border2);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em;color:var(--text);}
.cbadge.excl{background:var(--text);color:#fff;}
.cbadge.off{background:#1D1D1F;color:#fff;}
.cadd{position:absolute;top:11px;right:11px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--muted);}
.cadd.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.cadd:active{transform:scale(.85)}
.cbody{padding:14px 16px 16px}
.cloc{font-size:11px;font-weight:600;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.ctitle{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;line-height:1.3;margin-bottom:10px;}
.cstats{display:flex;gap:14px;margin-bottom:11px}
.cstat{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:500;}
.cfoot{display:flex;align-items:flex-end;justify-content:space-between;padding-top:11px;border-top:1px solid var(--border2);}
.cprice{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);}
.cprice-sub{font-size:11px;color:var(--muted);margin-top:1px;font-weight:500;}
.ctags{display:flex;gap:5px;flex-wrap:wrap}
.ctag{font-size:10px;padding:3px 8px;border-radius:5px;background:var(--bg2);color:var(--muted);font-weight:500;}
.dov{position:absolute;top:0;left:0;right:0;z-index:10;padding:48px 16px 16px;display:flex;justify-content:space-between;background:linear-gradient(to bottom,rgba(0,0,0,0.38) 0%,transparent 100%);}
.ibtn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.ibtn:active{transform:scale(.9)}
.ibtn.active{background:var(--blue);color:#fff;}
.gmain{width:100%;height:280px;object-fit:cover;display:block;flex-shrink:0;}
.gthumb-row{display:flex;gap:6px;padding:10px 16px;background:var(--bg);overflow-x:auto;scrollbar-width:none;flex-shrink:0;border-bottom:1px solid var(--border2);}
.gthumb-row::-webkit-scrollbar{display:none}
.gthumb{width:56px;height:40px;border-radius:7px;object-fit:cover;flex-shrink:0;cursor:pointer;transition:all .2s;border:2px solid transparent;opacity:.48;}
.gthumb.on{border-color:var(--blue);opacity:1}
.gcounter{position:absolute;bottom:12px;right:14px;background:rgba(0,0,0,0.48);backdrop-filter:blur(8px);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;}
.dbody{padding:20px;background:var(--bg);}
.dloc{font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.dtitle{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;line-height:1.2;margin-bottom:6px;}
.dprice{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:20px;}
.dprice span{font-size:13px;color:var(--muted);font-family:'Inter',sans-serif;font-weight:400;}
.dstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.dstat{background:var(--bg2);border-radius:10px;padding:12px;text-align:center;}
.dsv{font-size:17px;font-weight:600;display:block;margin-bottom:2px;}
.dsl{font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;display:block;font-weight:500;}
.ddesc{font-size:14px;line-height:1.78;color:var(--text2);margin-bottom:20px;}
.dtags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px}
.dtag{padding:6px 13px;border-radius:20px;border:1px solid var(--border);font-size:12px;color:var(--muted);font-weight:500;background:var(--bg2);}
.acc-item{border:1px solid var(--border2);border-radius:12px;margin-bottom:8px;overflow:hidden;background:var(--bg);}
.acc-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;font-weight:500;font-size:14px;transition:background .15s;}
.acc-hdr:active{background:var(--bg2)}
.acc-body{padding:0 16px 13px;}
.acc-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border2);font-size:13px;color:var(--text2);}
.acc-row:last-child{border-bottom:none}
.acc-row::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0;}
.cta{width:100%;padding:15px;border-radius:12px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:none;letter-spacing:.01em;display:block;text-align:center;}
.cta-blue{background:var(--blue);color:#fff;}
.cta-blue.added{background:var(--bg2);color:var(--blue);border:1.5px solid var(--blue);}
.cta-out{background:transparent;color:var(--blue);border:1.5px solid var(--blue);}
.cta:active{transform:scale(.97)}
.cta-red{background:rgba(255,59,48,0.08);color:var(--red);border:1.5px solid rgba(255,59,48,0.2);}
.cont-hdr{padding:52px 22px 18px;background:var(--bg);border-bottom:1px solid var(--border2);flex-shrink:0;}
.cont-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;margin-bottom:4px;}
.cont-sub{font-size:14px;color:var(--muted);}
.agent-card{margin:16px 18px;background:var(--bg);border:1px solid var(--border2);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}
.agent-photo{width:100%;height:200px;object-fit:cover;object-position:center 15%;display:block;}
.agent-info{padding:18px;}
.agent-name{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:2px;}
.agent-role{font-size:13px;color:var(--muted);margin-bottom:16px;font-weight:500;}
.cbtn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;margin-bottom:9px;text-decoration:none;}
.cbtn:last-child{margin-bottom:0}
.cbtn:active{transform:scale(.98)}
.cbtn-tg{background:var(--blue);color:#fff;}
.cbtn-phone{background:var(--bg2);border:1px solid var(--border);color:var(--text);}
.cbtn-ch{background:var(--bg2);border:1px solid var(--border);color:var(--text);}
.info-block{margin:0 18px 16px;background:var(--bg);border:1px solid var(--border2);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);}
.irow{display:flex;align-items:center;gap:13px;padding:14px 18px;border-bottom:1px solid var(--border2);}
.irow:last-child{border-bottom:none}
.iico{width:36px;height:36px;border-radius:9px;background:var(--bluea);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ititle{font-size:14px;font-weight:500;margin-bottom:1px;}
.isub{font-size:12px;color:var(--muted);}
.partner-box{margin:0 18px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;}
.partner-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.partner-text{font-size:14px;line-height:1.72;color:var(--text2);}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.28);backdrop-filter:blur(4px);z-index:300;transition:opacity .35s;border-radius:inherit;}
.overlay.hidden{opacity:0;pointer-events:none}
.col-panel{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-radius:26px 26px 0 0;z-index:310;transform:translateY(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);max-height:86%;display:flex;flex-direction:column;box-shadow:0 -8px 50px rgba(0,0,0,0.13);}
.col-panel.open{transform:translateY(0)}
.col-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.col-hdr{padding:15px 20px 13px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.col-hdr-title{font-family:'Playfair Display',serif;font-size:18px;}
.col-hdr-count{font-size:12px;color:var(--muted);font-weight:500;}
.col-scroll{overflow-y:auto;flex:1;scrollbar-width:none;}
.col-scroll::-webkit-scrollbar{display:none}
.colitem{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border2);}
.colnum{font-size:13px;color:var(--dim);width:18px;text-align:center;flex-shrink:0;font-weight:500;}
.colthumb{width:58px;height:58px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.colinfo{flex:1;min-width:0;}
.colitl{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.colloc{font-size:11px;color:var(--muted);}
.colprice{font-size:13px;color:var(--blue);font-weight:600;margin-top:3px;}
.delbtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0;}
.delbtn:active{transform:scale(.9)}
.col-footer{padding:16px 18px 24px;border-top:1px solid var(--border2);flex-shrink:0;}
.col-cta{width:100%;padding:15px;border-radius:12px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .2s;}
.col-cta:active{transform:scale(.98)}
.col-empty{padding:40px 28px;text-align:center;}
.col-empty-icon{font-size:36px;margin-bottom:14px;}
.col-empty-title{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:8px;}
.col-empty-sub{font-size:13px;color:var(--muted);line-height:1.65;}
.modal-ov{position:absolute;inset:0;background:rgba(0,0,0,0.36);backdrop-filter:blur(8px);z-index:400;display:flex;align-items:flex-end;transition:opacity .3s;border-radius:inherit;}
.modal-ov.hidden{opacity:0;pointer-events:none}
.modal{background:var(--bg);border-radius:24px 24px 0 0;padding:24px 22px 44px;width:100%;box-shadow:0 -8px 50px rgba(0,0,0,0.15);}
.modal-title{font-family:'Playfair Display',serif;font-size:21px;margin-bottom:5px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.65;}
.modal-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.modal-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:16px;}
.modal-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bluea);}
.modal-preview{background:var(--bluea);border:1px solid rgba(0,113,227,0.15);border-radius:12px;padding:14px 16px;margin-bottom:16px;}
.modal-preview-label{font-size:11px;font-weight:600;color:var(--blue);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.modal-preview-name{font-family:'Playfair Display',serif;font-size:17px;color:var(--text);}
.modal-link-row{display:flex;gap:8px;margin-bottom:10px;}
.modal-link-in{flex:1;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);font-size:11.5px;color:var(--muted);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.modal-copy{padding:11px 16px;border-radius:10px;border:none;background:var(--text);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;}
.modal-copy:active{opacity:.8}
.modal-meta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.modal-m{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;font-weight:500;}
.modal-m-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:inline-block;}
.modal-send{width:100%;padding:15px;border-radius:12px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;text-decoration:none;}
.modal-send:active{transform:scale(.98)}
.modal-send:disabled{opacity:0.6;cursor:not-allowed}
.pin-ov{position:absolute;inset:0;background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);z-index:600;display:flex;align-items:flex-end;transition:opacity .3s;border-radius:inherit;}
.pin-ov.hidden{opacity:0;pointer-events:none}
.pin-modal{background:var(--bg);border-radius:26px 26px 0 0;padding:28px 24px 44px;width:100%;box-shadow:0 -8px 50px rgba(0,0,0,0.2);}
.pin-title{font-family:'Playfair Display',serif;font-size:22px;text-align:center;margin-bottom:6px;}
.pin-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;}
.pin-dots{display:flex;justify-content:center;gap:16px;margin-bottom:32px;}

async function compressImage(file, maxKB=900) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const MAX=1920; let {width:w,height:h}=img;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.85,lo=0.1,hi=0.95;
      const try_=q=>new Promise(r=>c.toBlob(r,'image/jpeg',q));
      (async()=>{
        for(let i=0;i<6;i++){const b=await try_(q);if(b.size/1024<=maxKB){resolve(b);return;}hi=q;q=(lo+hi)/2;}
        resolve(await try_(lo));
      })();
    };
    img.src=url;
  });
}

  };

  const toggleTag = t => set('tags', form.tags.includes(t)?form.tags.filter(x=>x!==t):[...form.tags,t]);

  const addItem = si => { const s=[...form.sections]; s[si].items=[...s[si].items,'']; set('sections',s); };
  const updItem = (si,ii,v) => { const s=[...form.sections]; s[si].items[ii]=v; set('sections',s); };
  const delItem = (si,ii) => { const s=[...form.sections]; s[si].items=s[si].items.filter((_,j)=>j!==ii); set('sections',s); };
  const delSection = si => set('sections',form.sections.filter((_,j)=>j!==si));

  const submit = async () => {
    if(!form.title||!form.location||!form.price||!form.area){showToast('Заполните обязательные поля');return;}
    setSaving(true);
    try {
      setProgress('Сохраняю объект…');
      const sections = form.sections.filter(s=>s.title).map(s=>({title:s.title,items:s.items.filter(i=>i)}));
      const {data:prop,error} = await db.from('properties').insert([{
        title:form.title, description:form.description||null, location:form.location,
        price:Number(form.price.replace(/\s/g,'')), price_negotiable:form.price_negotiable,
        area:Number(form.area), beds:form.beds?Number(form.beds):null, baths:form.baths?Number(form.baths):null,
        floors:form.floors?Number(form.floors):null, year_built:form.year_built?Number(form.year_built):null,
        land_area:form.land_area?Number(form.land_area):null,
        status:form.status, video_url:form.video_url||null, tags:form.tags, sections,
      }]).select().single();
      if(error) throw error;

      if(photoFiles.length>0){

          const blob = await compressImage(photoFiles[i]);
          const path = `properties/${prop.id}/photo_${String(i).padStart(2,'0')}_${Date.now()}.jpg`;
          const {error:ue} = await db.storage.from('properties').upload(path,blob,{contentType:'image/jpeg'});

          const {data:ud} = db.storage.from('properties').getPublicUrl(path);

            <div><div className="field-label">Санузлы</div><input className="field-input" placeholder="4" value={form.baths} onChange={e=>set('baths',e.target.value)} inputMode="numeric"/></div>

            <div><div className="field-label">Статус</div>

// ─── EDIT FORM ────────────────────────────────────────────────────────────────
const EditForm = ({visible, prop, onClose, onSaved, showToast}) => {
  const [form, setForm] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    if(prop) setForm({
      title: prop.title||'', description: prop.description||'', location: prop.location||'',
      price: prop.price?String(prop.price):'', area: prop.area?String(prop.area):'',
      beds: prop.beds?String(prop.beds):'', baths: prop.baths?String(prop.baths):'',
      floors: prop.floors?String(prop.floors):'', status: prop.status||'active',
      video_url: prop.video_url||'', price_negotiable: prop.price_negotiable||false,
      tags: prop.tags||[],
    });
  }, [prop]);

  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const toggleTag = t => set('tags', form.tags?.includes(t)?form.tags.filter(x=>x!==t):[...(form.tags||[]),t]);

  const submit = async () => {
    if(!form.title||!form.location||!form.price||!form.area){showToast('Заполните обязательные поля');return;}
    setSaving(true);
    try {
      const {error} = await db.from('properties').update({
        title:form.title, description:form.description||null, location:form.location,
        price:Number(String(form.price).replace(/\s/g,'')), price_negotiable:form.price_negotiable,
        area:Number(form.area), beds:form.beds?Number(form.beds):null,
        baths:form.baths?Number(form.baths):null, floors:form.floors?Number(form.floors):null,
        status:form.status, video_url:form.video_url||null, tags:form.tags,
      }).eq('id', prop.id);
      if(error) throw error;
      showToast('Сохранено ✓');
      onSaved();
      onClose();
    } catch(e){ showToast('Ошибка: '+e.message); }
    finally{ setSaving(false); }
  };

  if(!prop) return null;
  return (
    <div className={`form-screen ${visible?'':'hidden'}`} style={{zIndex:25}}>
      <div className="form-hdr">
        <div className="ibtn" onClick={onClose}><Ico n="close" s={17}/></div>
        <div className="form-hdr-title">Редактировать</div>
        {saving&&<span className="spin"><Ico n="loader" s={18} c="var(--blue)"/></span>}
      </div>
      <div className="scroll">
        <div className="form-body">
          <div><div className="field-label">Название *</div><input className="field-input" value={form.title||''} onChange={e=>set('title',e.target.value)}/></div>
          <div><div className="field-label">Локация *</div><input className="field-input" value={form.location||''} onChange={e=>set('location',e.target.value)}/></div>
          <div className="row2">
            <div><div className="field-label">Цена, ₽ *</div><input className="field-input" value={form.price||''} onChange={e=>set('price',e.target.value)} inputMode="numeric"/></div>
            <div><div className="field-label">Площадь, м²</div><input className="field-input" value={form.area||''} onChange={e=>set('area',e.target.value)} inputMode="decimal"/></div>
          </div>
          <div className="row2">
            <div><div className="field-label">Спальни</div><input className="field-input" value={form.beds||''} onChange={e=>set('beds',e.target.value)} inputMode="numeric"/></div>
            <div><div className="field-label">Санузлы</div><input className="field-input" value={form.baths||''} onChange={e=>set('baths',e.target.value)} inputMode="numeric"/></div>
          </div>
          <div className="row2">
            <div><div className="field-label">Этажей</div><input className="field-input" value={form.floors||''} onChange={e=>set('floors',e.target.value)} inputMode="numeric"/></div>
            <div><div className="field-label">Статус</div>
              <select className="field-select" value={form.status||'active'} onChange={e=>set('status',e.target.value)}>
                <option value="active">Продаётся</option><option value="exclusive">Эксклюзив</option>
                <option value="off_market">Off-Market</option><option value="reserved">Забронировано</option><option value="sold">Продано</option>
              </select>
            </div>
          </div>
          <div><div className="field-label">Описание</div><textarea className="field-input" value={form.description||''} onChange={e=>set('description',e.target.value)}/></div>
          <div><div className="field-label">Видео (Telegram)</div><input className="field-input" value={form.video_url||''} onChange={e=>set('video_url',e.target.value)}/></div>
          <div>
            <div className="field-label">Теги</div>
            <div className="tags-wrap">{ALL_TAGS.map(t=><div key={t} className={`tag-toggle ${(form.tags||[]).includes(t)?'on':''}`} onClick={()=>toggleTag(t)}>{t}</div>)}</div>
          </div>
          <button className="form-submit" disabled={saving} onClick={submit}>{saving?'Сохраняю…':'Сохранить изменения'}</button>
        </div>
      </div>
    </div>
  );
};

  const loadShare = async token => {

  };

  const loadProperties = useCallback(async () => {
    setLoading(true);

    if(query) q=q.or(`title.ilike.%${query}%,location.ilike.%${query}%`);
    const {data} = await q.order('created_at',{ascending:false});
    setProperties(data||[]);
    setLoading(false);
  }, [filter, query]);

  useEffect(()=>{ loadProperties(); },[loadProperties]);

  const loadHistory = useCallback(async () => {
    const {data} = await db.from('collections')

      .eq('agent_telegram_id', ADMIN_TELEGRAM_ID)

  useEffect(()=>{ if(isAdmin) loadHistory(); },[isAdmin, loadHistory]);

  const showToast = msg => {

  };

  const go = (s,n) => { setScreen(s); if(n) setNav(n); };

                      {isAdmin&&<div className={`cadd ${added.has(p.id)?'on':''}`} onClick={e=>toggleAdd(p,e)}>{added.has(p.id)?<Ico n="check" s={14} c="#fff"/>:<Ico n="plus" s={14}/>}</div>}
                    </div>
                    <div className="cbody">
                      <div className="cloc"><Ico n="pin" s={10}/>{p.location}</div>
                      <div className="ctitle">{p.title}</div>
                      <div className="cstats">
                        {p.beds&&<div className="cstat"><Ico n="bed" s={12} c="var(--muted)"/>{p.beds} спал.</div>}
                        {p.area&&<div className="cstat"><Ico n="area" s={12} c="var(--muted)"/>{p.area} м²</div>}
                        {p.floors&&<div className="cstat">{p.floors} эт.</div>}
                      </div>
                      <div className="cfoot">
                        <div><div className="cprice">₽ {fmt(p.price)}</div>{p.price_negotiable&&<div className="cprice-sub">Торг возможен</div>}</div>
                        <div className="ctags">{(p.tags||[]).slice(0,2).map(t=><div key={t} className="ctag">{t}</div>)}</div>
                      </div>
                    </div>
                  </div>
                ))
          }
          <div style={{height:16}}/>
        </div>
        <BottomNav nav={nav} go={go} count={collection.length} onCol={()=>setColOpen(true)} isAdmin={isAdmin}/>
      </div>

      {/* DETAIL */}
      <div className={`screen ${sc('detail')}`} style={{background:'var(--bg)'}}>
        {prop&&<>
          {/* Кнопки поверх — фиксированные */}
          <div className="dov" style={{position:'absolute',zIndex:15}}>
            <div className="ibtn" onClick={()=>go(nav)}><Ico n="back" s={17}/></div>
            {isAdmin&&<div className={`ibtn ${added.has(prop.id)?'active':''}`} onClick={e=>toggleAdd(prop,e)}><Ico n="layers" s={16} c={added.has(prop.id)?'#fff':'var(--text)'}/></div>}
          </div>
          <div className="scroll">
            <div
              onTouchStart={e=>{ swipeStartX.current = e.touches[0].clientX; }}
              onTouchEnd={e=>{
                if(swipeStartX.current===null) return;
                const dx = e.changedTouches[0].clientX - swipeStartX.current;
                if(Math.abs(dx)>50){
                  if(dx<0) setGIdx(i=>Math.min(i+1,gallery.length-1));
                  else setGIdx(i=>Math.max(i-1,0));
                }
                swipeStartX.current=null;
              }}
              style={{position:'relative',flexShrink:0}}
            >
              <img className="gmain" src={gallery[gIdx]||prop.cover_url||'https://placehold.co/900x600/1e4080/fff?text=Фото'} alt=""
                onClick={()=>setZoomImg(gallery[gIdx]||prop.cover_url)}
                style={{cursor:'zoom-in'}}
              />
              {gallery.length>1&&<div className="gcounter">{gIdx+1} / {gallery.length}</div>}
            </div>
            {gallery.length>1&&(
              <div className="gthumb-row">
                {gallery.map((img,i)=>(
                  <img key={i} className={`gthumb ${i===gIdx?'on':''}`} src={img} alt="" onClick={()=>setGIdx(i)}/>
                ))}
              </div>
            )}
            <div className="dbody">
              <div className="dloc"><Ico n="pin" s={10}/>{prop.location}</div>
              <div className="dtitle">{prop.title}</div>
              <div className="dprice">₽ {fmt(prop.price)}{prop.price_negotiable&&<span> · торг возможен</span>}</div>
              <div className="dstats">
                {prop.beds&&<div className="dstat"><span className="dsv">{prop.beds}</span><span className="dsl">Спальни</span></div>}
                {prop.area&&<div className="dstat"><span className="dsv">{prop.area}</span><span className="dsl">м²</span></div>}
                {prop.baths&&<div className="dstat"><span className="dsv">{prop.baths}</span><span className="dsl">Санузлы</span></div>}
              </div>
              {(prop.tags||[]).length>0&&<div className="dtags">{prop.tags.map(t=><div key={t} className="dtag">{t}</div>)}</div>}
              {prop.description&&<div className="ddesc">{prop.description}</div>}
              {(prop.sections||[]).map((sec,si)=>(
                <div key={si} className="acc-item">
                  <div className="acc-hdr" onClick={()=>setOpenAcc(openAcc===si?null:si)}>{sec.title}<Ico n={openAcc===si?'chevu':'chevd'} s={16} c="var(--muted)"/></div>
                  {openAcc===si&&<div className="acc-body">{sec.items.map((it,ii)=><div key={ii} className="acc-row">{it}</div>)}</div>}
                </div>
              ))}
              <div style={{height:18}}/>
              {isAdmin&&<>
                <button className={`cta cta-blue ${added.has(prop.id)?'added':''}`} onClick={e=>toggleAdd(prop,e)} style={{marginBottom:10}}>{added.has(prop.id)?'✓ В подборке — убрать':'+ Добавить в подборку'}</button>
                <button className="cta cta-out" style={{marginBottom:10}} onClick={()=>{setEditProp(prop);setShowEditForm(true);}}>✏️ Редактировать</button>
                <button className="cta cta-red" style={{marginBottom:10}} onClick={async()=>{if(confirm('Архивировать объект?')){await db.from('properties').update({archived_at:new Date().toISOString()}).eq('id',prop.id);showToast('Архивировано');go('catalog','catalog');loadProperties();}}}>Архивировать объект</button>
              </>}
              {prop.video_url&&(
                <a className="cta cta-out" href={prop.video_url} target="_blank" rel="noreferrer"
                  style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,marginBottom:10,textDecoration:'none'}}>
                  <Ico n="tg" s={17} c="var(--blue)"/> Смотреть в Telegram
                </a>
              )}
              <button className="cta cta-out" onClick={()=>go('contacts','contacts')}>Связаться с Артёмом</button>
              <div style={{height:32}}/>
            </div>
          </div>
        </>}
      </div>

      {/* CONTACTS */}
      <div className={`screen ${sc('contacts')}`} style={{background:'var(--bg2)'}}>
        <div className="cont-hdr"><div className="cont-title">Контакты</div><div className="cont-sub">Артём Рафаелович Сеферян</div></div>
        <div className="scroll">
          <div className="agent-card">
            <img className="agent-photo" src={AGENT.photo} alt="Артём"/>
            <div className="agent-info">
              <div className="agent-name">Артём Сеферян</div>
              <div className="agent-role">Частная премиальная недвижимость · Сочи · 10+ лет</div>
              <a className="cbtn cbtn-tg" href={`https://t.me/${AGENT.telegram}`} target="_blank" rel="noreferrer"><Ico n="tg" s={18} c="#fff"/>Написать @{AGENT.telegram}</a>
              <a className="cbtn cbtn-phone" href={`tel:${AGENT.phone}`}><Ico n="phone" s={18} c="var(--text)"/>Позвонить</a>
              <a className="cbtn cbtn-ch" href={`https://t.me/${AGENT.channel}`} target="_blank" rel="noreferrer"><Ico n="ext" s={18} c="var(--muted)"/>Telegram канал</a>
            </div>
          </div>
          <div className="info-block">
            {[{ico:'pin',title:'Локация',sub:'Сочи, Краснодарский край'},{ico:'star',title:'Специализация',sub:'Прибрежные районы, Красная Поляна'},{ico:'catalog',title:'Опыт',sub:'Более 10 лет в премиальной недвижимости'},{ico:'eye',title:'Сделок закрыто',sub:'Более 200 сделок'}].map((r,i)=>(
              <div key={i} className="irow"><div className="iico"><Ico n={r.ico} s={17} c="var(--blue)"/></div><div><div className="ititle">{r.title}</div><div className="isub">{r.sub}</div></div></div>
            ))}
          </div>
          <div className="partner-box">
            <div className="partner-label">Партнёрам</div>
            <div className="partner-text">Работаю с агентами по принципу открытых сделок. Комиссия по договорённости. Приветствую долгосрочное сотрудничество в премиальном сегменте Сочи.</div>
          </div>
          <div style={{height:16}}/>
        </div>
        <BottomNav nav={nav} go={go} count={collection.length} onCol={()=>setColOpen(true)} isAdmin={isAdmin}/>
      </div>

      {/* COLLECTION PANEL */}
      <div className={`overlay ${colOpen?'':'hidden'}`} onClick={()=>setColOpen(false)}/>
      <div className={`col-panel ${colOpen?'open':''}`}>
        <div className="col-handle"/>
        <div className="col-hdr">
          <div className="col-hdr-title">Моя подборка</div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div className="col-hdr-count">{collection.length} объектов</div>
            <div style={{fontSize:12,color:'var(--blue)',fontWeight:600,cursor:'pointer',padding:'4px 10px',borderRadius:20,background:'var(--bluea)'}} onClick={()=>{setColOpen(false);setShowHistory(true);}}>История</div>
          </div>
        </div>
        <div className="col-scroll">
          {collection.length===0
            ? <div className="col-empty"><div className="col-empty-icon">🏡</div><div className="col-empty-title">Подборка пуста</div><div className="col-empty-sub">Добавляйте объекты из каталога</div></div>
            : collection.map((item,i)=>(
                <div key={item.id} className="colitem">
                  <div className="colnum">{i+1}</div>
                  <img className="colthumb" src={item.cover_url||'https://placehold.co/120x120/eee/999?text=Фото'} alt=""/>
                  <div className="colinfo"><div className="colitl">{item.title}</div><div className="colloc">{item.location}</div><div className="colprice">₽ {fmt(item.price)}</div></div>
                  <button className="delbtn" onClick={()=>{setAdded(prev=>{const s=new Set(prev);s.delete(item.id);return s;});setCollection(prev=>prev.filter(x=>x.id!==item.id));}}><Ico n="trash" s={13}/></button>
                </div>
              ))
          }
        </div>
        {collection.length>0&&<div className="col-footer"><button className="col-cta" onClick={()=>{setColOpen(false);setShareToken('');setModalOpen(true);}}>Персонализировать и отправить</button></div>}
      </div>

      {/* HISTORY SCREEN */}
      <div className={`form-screen ${showHistory?'':'hidden'}`}>
        <div className="form-hdr">
          <div className="ibtn" onClick={()=>setShowHistory(false)}><Ico n="back" s={17}/></div>
          <div className="form-hdr-title">История подборок</div>
        </div>
        <div className="scroll">
          {colHistory.length===0
            ? <div className="col-empty" style={{paddingTop:60}}><div className="col-empty-icon">📋</div><div className="col-empty-title">Пока пусто</div><div className="col-empty-sub">Отправленные подборки появятся здесь</div></div>
            : colHistory.map(c=>{
                const date = new Date(c.created_at);
                const dateStr = date.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
                const timeStr = date.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
                const expired = c.expires_at && new Date(c.expires_at)<new Date();
                const shortUrl = `${window.location.origin}${window.location.pathname}?share=${c.share_token}`;
                return (
                  <div key={c.id} style={{margin:'0 16px 10px',background:'var(--bg)',border:'1px solid var(--border2)',borderRadius:14,padding:'14px 16px',boxShadow:'var(--shadow)'}}>
                    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:6}}>
                      <div style={{fontFamily:'Playfair Display,serif',fontSize:16,flex:1,marginRight:8}}>{c.title}</div>
                      <div style={{fontSize:10,padding:'3px 8px',borderRadius:20,background:expired?'rgba(255,59,48,0.08)':'rgba(52,199,89,0.1)',color:expired?'var(--red)':'var(--green)',fontWeight:600,flexShrink:0}}>{expired?'Истекла':'Активна'}</div>
                    </div>
                    <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>
                      {c.client_name&&<span style={{marginRight:10}}>👤 {c.client_name}</span>}
                      <span>📅 {dateStr} в {timeStr}</span>
                    </div>
                    <div style={{display:'flex',gap:8}}>
                      <button style={{flex:1,padding:'9px',borderRadius:10,border:'1px solid var(--border)',background:'var(--bg2)',fontSize:12,fontWeight:600,cursor:'pointer',color:'var(--text)'}}
                        onClick={()=>{navigator.clipboard?.writeText(shortUrl);showToast('Ссылка скопирована ✓');}}>
                        Копировать ссылку
                      </button>
                      <button style={{padding:'9px 14px',borderRadius:10,border:'1px solid rgba(255,59,48,0.2)',background:'rgba(255,59,48,0.06)',fontSize:12,fontWeight:600,cursor:'pointer',color:'var(--red)'}}
                        onClick={async()=>{if(confirm('Удалить подборку?')){await db.from('collections').update({archived_at:new Date().toISOString()}).eq('id',c.id);loadHistory();showToast('Удалено');}}}>
                        Удалить
                      </button>
                    </div>
                  </div>
                );
              })
          }
          <div style={{height:32}}/>
        </div>
      </div>

      {/* EDIT FORM */}
      {editProp&&<EditForm visible={showEditForm} prop={editProp} onClose={()=>{setShowEditForm(false);setEditProp(null);}} onSaved={()=>{loadProperties();go('catalog','catalog');}} showToast={showToast}/>}

      {/* SEND MODAL */}
      <div className={`modal-ov ${modalOpen?'':'hidden'}`} onClick={e=>{if(e.target===e.currentTarget)setModalOpen(false);}}>
        <div className="modal">
          <div className="modal-title">Для кого подборка?</div>
          <div className="modal-sub">Введите имя клиента — оно появится в заголовке презентации</div>
          <div className="modal-label">Имя клиента</div>
          <input className="modal-input" placeholder="Александр Петров" value={clientName} onChange={e=>setClientName(e.target.value)}/>
          {clientName&&<div className="modal-preview"><div className="modal-preview-label">Заголовок</div><div className="modal-preview-name">Подборка для {clientName}</div></div>}
          {!shareToken
            ? <button className="modal-send" disabled={sending} onClick={sendCollection}>{sending?'Создаю ссылку…':'Создать ссылку'}</button>
            : <>
                <div className="modal-label">Ссылка</div>
                <div className="modal-link-row">
                  <div className="modal-link-in">{shareToken}</div>
                  <button className="modal-copy" onClick={()=>{navigator.clipboard?.writeText(shareToken);setCopied(true);showToast('Скопировано ✓');setTimeout(()=>setCopied(false),2000);}}>{copied?'✓':'Копировать'}</button>
                </div>
                <div className="modal-meta">
                  <div className="modal-m"><span className="modal-m-dot"/>7 дней активна</div>
                  <div className="modal-m"><span className="modal-m-dot"/>Без регистрации</div>
                  <div className="modal-m"><span className="modal-m-dot"/>Контакты скрыты</div>
                </div>
                <a className="modal-send" href={`https://t.me/share/url?url=${encodeURIComponent(shareToken)}&text=${encodeURIComponent('Подборка для ' + (clientName||'вас') + ' от Артёма Сеферяна')}`} target="_blank" rel="noreferrer">
                  <Ico n="tg" s={18} c="#fff"/> Отправить в Telegram
                </a>
              </>
          }
        </div>
      </div>

      {/* PIN */}
      <div className={`pin-ov ${loginOpen?'':'hidden'}`}>
        <div className="pin-modal">
          <div className="pin-title">Вход</div>
          <div className="pin-sub">PIN-код администратора</div>
          <div className="pin-dots">{[0,1,2,3].map(i=><div key={i} className={`pin-dot ${pinErr?'error':pin.length>i?'filled':''}`}/>)}</div>
          <div className="pin-grid">
            {['1','2','3','4','5','6','7','8','9','','0','⌫'].map((d,i)=>(
              <div key={i} className="pin-btn" style={d===''?{background:'transparent',border:'none',cursor:'default'}:{}}
                onClick={()=>{if(!d)return;if(d==='⌫'){setPin(p=>p.slice(0,-1));setPinErr(false);return;}handlePin(d);}}>
                {d}
              </div>
            ))}
          </div>
          <button className="pin-cancel" onClick={()=>{setLoginOpen(false);setPin('');setPinErr(false);}}>Отмена</button>
        </div>
      </div>

      {/* ADD FORM */}
      <AddForm visible={showForm} onClose={()=>setShowForm(false)} onSaved={loadProperties} showToast={showToast}/>

      {/* ZOOM OVERLAY */}
      {zoomImg&&(
        <div className="zoom-ov"
          onClick={()=>setZoomImg(null)}
          onTouchStart={e=>{ swipeStartX.current=e.touches[0].clientX; }}
          onTouchEnd={e=>{
            const dx=e.changedTouches[0].clientX-swipeStartX.current;
            if(Math.abs(dx)>50){
              if(dx<0) setGIdx(i=>{ const n=Math.min(i+1,gallery.length-1); setZoomImg(gallery[n]); return n; });
              else setGIdx(i=>{ const n=Math.max(i-1,0); setZoomImg(gallery[n]); return n; });
              swipeStartX.current=null;
            }
          }}
        >
          <div className="zoom-close" onClick={e=>{e.stopPropagation();setZoomImg(null);}}><Ico n="close" s={16} c="#fff"/></div>
          <img className="zoom-img" src={zoomImg} alt="" onClick={e=>e.stopPropagation()}/>
          {gallery.length>1&&<div className="zoom-counter">{gIdx+1} / {gallery.length}</div>}
        </div>
      )}

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
